.deckpick button.sel{background:linear-gradient(135deg,var(--rose),var(--lav)); color:#fff; border-color:transparent}

  font-family:inherit; font-size:16px; letter-spacing:.15em; color:#fff; cursor:pointer;
  background:linear-gradient(135deg,var(--rose),var(--lav));
  border:none; border-radius:16px; padding:16px 44px;
  box-shadow:0 6px 22px rgba(216,167,177,.35); transition:transform .25s, box-shadow .25s;
}
.cta:hover{transform:translateY(-2px); box-shadow:0 10px 26px rgba(197,180,227,.45)}
/* ---- テーブル ---- */
#table-scene{padding:12px 0 0}
#hint{font-size:14px; letter-spacing:.12em; text-align:center; padding:14px 20px 6px; line-height:1.9;
  transition:opacity .6s}
#table{position:relative; width:100%; flex:1; min-height:430px; cursor:pointer}
.cardback{
  position:absolute; left:0; top:0; will-change:transform;
  border-radius:10px; overflow:hidden;
  box-shadow:0 4px 14px rgba(93,78,96,.28);
  background:radial-gradient(ellipse at 50% 38%, #E6DDF6 0%, #C5B4E3 58%, #A48FD3 100%);
  border:1.5px solid rgba(176,138,79,.85);
}
.cardback svg{display:block; width:100%; height:100%}
/* ---- 結果 ---- */
#result{padding-top:30px; gap:0}
#flipwrap{perspective:1200px; margin:10px auto 0}
@keyframes growin{from{transform:scale(.8); opacity:.3} to{transform:scale(1); opacity:1}}
#flipcard{position:relative; transform-style:preserve-3d; transition:transform 1.15s cubic-bezier(.4,.1,.2,1)}
#flipcard.flipped{transform:rotateY(180deg)}
.face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:12px; overflow:hidden; box-shadow:0 10px 34px rgba(93,78,96,.25)}
.face.front{transform:rotateY(180deg); background:#fff}
.face.front img{width:100%; height:100%; object-fit:cover; display:block}
.face.backface{background:radial-gradient(ellipse at 50% 38%, #E6DDF6 0%, #C5B4E3 58%, #A48FD3 100%);
  border:2px solid rgba(176,138,79,.85)}
.face.backface svg{display:block; width:100%; height:100%}
#info{opacity:0; transform:translateY(14px); transition:opacity .9s, transform .9s; max-width:620px;
  text-align:center; padding:26px 8px 10px}
#info.show{opacity:1; transform:none}
#info .deckline{font-size:11px; letter-spacing:.22em; color:var(--gold)}
#info h2{font-size:27px; font-weight:600; letter-spacing:.12em; margin-top:8px}
#info .en{font-size:12px; letter-spacing:.28em; color:#A08FA6; margin-top:4px; text-transform:uppercase}
#info .mt{font-size:16px; margin-top:16px; color:var(--ink); letter-spacing:.06em}
.chips{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:16px}
.chips span{font-size:12px; background:var(--peach); color:var(--ink);
  border-radius:999px; padding:6px 13px; line-height:1.5}
#hintbox{margin-top:30px; background:rgba(247,202,201,.42);
  border:1px solid rgba(201,168,106,.6); border-radius:16px; padding:20px 18px 18px;
  box-shadow:0 4px 16px rgba(216,167,177,.22);
  transition:transform .5s cubic-bezier(.2,.6,.3,1), box-shadow .5s ease}
#hintbox:hover, #hintbox:active{
  transform:translateY(-5px) scale(1.025);
  box-shadow:0 14px 36px rgba(216,167,177,.5), 0 0 0 1px rgba(201,168,106,.35)}
#info #hintbox .subttl{font-size:15px; font-weight:600; letter-spacing:.3em; color:var(--gold); margin:0}
#hintbox .chips{margin-top:14px}
.chips.subs span{background:#fff; border:1px solid rgba(201,168,106,.5); font-size:13px;
  padding:7px 15px; box-shadow:0 2px 6px rgba(93,78,96,.08)}
#info .msg{font-size:14.5px; line-height:2.15; text-align:left; margin-top:22px; white-space:pre-line}
#info .subttl{font-size:12px; letter-spacing:.25em; color:var(--gold); margin-top:26px}
#again{display:inline-block; margin:30px 0 6px; font-size:13px; letter-spacing:.1em;
  color:var(--ink); cursor:pointer; background:none; border:none; font-family:inherit;
  border-bottom:1px solid var(--gold); padding-bottom:2px}
#home{display:block; margin:18px auto 10px; font-family:inherit; font-size:13.5px;
  letter-spacing:.12em; color:var(--ink); cursor:pointer;
  background:#fff; border:1px solid rgba(201,168,106,.55); border-radius:999px;
  padding:11px 34px; transition:all .3s}
#home:hover{background:linear-gradient(135deg,var(--rose),var(--lav)); color:#fff; border-color:transparent}
footer{text-align:center; font-size:11px; line-height:1.9; color:#A79AAB; padding:26px 24px 30px}
@media (max-width:480px){
  #intro h1{font-size:28px}
  #info h2{font-size:23px}
}
@media (prefers-reduced-motion: reduce){
  *{transition-duration:.01s !important; animation:none !important}
}
</style>
</head>
<body>
<main>
  <!-- 入口 -->
  <section id="intro" class="scene on">
    <div>
      <div class="sub">みちよオラクル</div>
      <h1>今日の１枚</h1>
    </div>
    <p class="lead">呼吸をひとつして、<br>心が落ち着いたら始めてください。</p>
    <div class="deckpick" id="deckpick">
      <button data-deck="mix" class="sel">2つのデッキから(77枚)</button>
      <button data-deck="ancient">Ancient Mystery Oracle(33枚)</button>
      <button data-deck="infinity">Infinity Oracle(44枚)</button>
    </div>
    <button class="cta" id="start" style="width:min(300px,82vw)">カードをシャッフルする</button>
  </section>

  <!-- テーブル -->
  <section id="table-scene" class="scene">
    <div id="hint">カードが混ざっています。<br>心が決まったら、どこでも触れてください。</div>
    <div id="table"></div>
  </section>

  <!-- 結果 -->
  <section id="result" class="scene">
    <div id="flipwrap"><div id="flipcard">
      <div class="face backface" id="resultback"></div>
      <div class="face front"><img id="cardimg" alt=""></div>
    </div></div>
    <div id="info">
      <div class="deckline"></div>
      <h2></h2>
      <div class="en"></div>
      <div class="mt"></div>
      <div class="chips kws"></div>
      <div class="msg"></div>
      <div id="hintbox">
        <div class="subttl">✦ 今日のヒント ✦</div>
        <div class="chips subs"></div>
      </div>
      <button id="again">もう一度シャッフルする</button>
      <button id="home">ホームに戻る</button>
    </div>
  </section>
</main>
<footer>カードからのメッセージは、あなたの心の声に耳を澄ますためのきっかけです。<br>
答えを決めるのは、いつもあなた自身です。&nbsp;&nbsp;© みちよ</footer>

<script>
const CARDS = [{"id": "AMO-01", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 1, "en": "Ancient Civilisation", "jp": "古代文明", "mt": "大地は覚えている", "kw": ["自然との調和", "地球意識", "原初の叡智"], "msg": "この大地の下に眠っているのは、地球と共に生きた人々の静かな叡智の記憶。星を見上げ、風に耳を澄まし、水の流れに身を委ねた魂たちの調和。彼らは自然の一部として生き、大地のリズムを感じ、月の満ち欠けに祈り、太陽の恵みに感謝していました。この世界はどんなに技術が発達しても、人は自然の一部であることを忘れてはいけません。深呼吸をして大地を感じてください。裸足で土を踏むように、ゆっくりと原初の感覚を思い出していきましょう。", "sub": ["自然の中で過ごす", "グラウンディング", "デジタルデトックス", "深呼吸", "月のリズム", "植物", "動物との繋がりを持つ"], "img": "images/AMO/amo_01.jpg"}, {"id": "AMO-02", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 2, "en": "Ancient People", "jp": "古代の人々", "mt": "生き抜く創造力", "kw": ["原初のエネルギー", "地球との一体感", "可能性の力"], "msg": "古代の人々は、困難に直面しても諦めることなく、厳しい自然の中で生き抜きました。火を起こし、道具を作り、知恵を分かち合い、支え合いながら、創造性と工夫で道を切り開いたのです。彼らは生きることを諦めませんでした。あなたの内側にも、たくましい力が宿っています。困難は、あなたを壊すためではなく、創造性を目覚めさせるためのものでもあります。あなたの中に眠る無限の可能性を信じてください。工夫と創造が、道を開いていきます。生き延びる力は、あなたの中にあるのです。", "sub": ["野生の直感", "生命力", "平和", "安寧", "調和", "共有", "共生", "共感", "可能性", "想像力", "シェア", "分かち合い"], "img": "images/AMO/amo_02.jpg"}, {"id": "AMO-03", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 3, "en": "Gobekli Tepe", "jp": "ギョベクリ・テペ", "mt": "祈りの原点", "kw": ["原初の信仰", "宇宙との交信", "集合意識の起点"], "msg": "一万年以上前、人々は集まり、星を見上げ、宇宙と交信しました。祈りは人類の最も古い営み、集合意識の起点です。あなたはひとりではなく、すべての魂とつながっています。いにしえの時代に魂の仲間と見上げた星空を思い出してください。あなたが静かに祈る時、宇宙が応えます。ギョベクリ・テペは、人類の霊性の始まり。当時の祈りの波動は今でも振動しています。あなた自身が天と地をつなぐ柱となり、祈りの力を思い出してください。", "sub": ["祈りの力", "遺跡", "古代文明", "宇宙との交信", "テレパシー", "想いは祈りによって伝わる", "儀式", "振動", "波動", "過去の清算"], "img": "images/AMO/amo_03.jpg"}, {"id": "AMO-04", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 4, "en": "Lemuria", "jp": "レムリア", "mt": "ハートの故郷", "kw": ["ハートの覚醒", "女性性の癒し", "無条件の愛の記憶"], "msg": "愛だけがあった夢の記憶。太古の時代、レムリアの人々はハートで生きていました。純粋な愛の文明、無条件の受容、すべてとの調和。その記憶が蘇ることで、すべての人類はもうこの世界で戦う必要がないことを知るでしょう。愛の周波数にチューニングしてください。レムリアの時代、人々のハートのチャクラは完全に開いていました。感情が自由に流れ、すべてが愛で満たされていたのです。あなたの中にも、レムリアの記憶が眠っています。今その感覚を思い出しましょう。ハートに還るとき、解決の糸口が見えてきます。", "sub": ["ハートチャクラ", "愛の記憶", "一人が愛で生きると周りも幸せになる", "愛のアチューメント", "運命共同体", "繋がること", "育むこと", "自分を愛することの重要性"], "img": "images/AMO/amo_04.jpg"}, {"id": "AMO-05", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 5, "en": "Atlantis", "jp": "アトランティス", "mt": "失われた光の再生", "kw": ["失われた叡智と文明の再生", "魂の使命覚醒"], "msg": "あなたの魂は、古い約束を覚えています。かつて輝いていた光の文明の記憶が、あなたの細胞に刻まれています。失われたものは、永遠に失われたのではなく、再生する時を待っていたのです。アトランティスは、高度な霊性とテクノロジーが調和した世界。その叡智を、今度は正しく使うためにあなたは戻ってきました。今、その時が来ています。あなたの中で古代の光が目覚めるとき、新しい世界が始まります。目覚めの時は「今」です。あなたの魂の使命を果たす時です。", "sub": ["高度な霊性", "テクノロジー", "正しい導き", "何が最も重要かを見極める", "決断", "魂の使命", "再生", "役割", "責任"], "img": "images/AMO/amo_05.jpg"}, {"id": "AMO-06", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 6, "en": "Orion", "jp": "オリオン", "mt": "星の秩序", "kw": ["宇宙の秩序", "魂の起源", "星間意識への回帰"], "msg": "星間意識への扉が開いています。三つの星が、あなたの道を照らします。オリオンのベルトが示す完璧な配列。宇宙の秩序は、美しく調和しています。あなたは宇宙の一部で宇宙はあなたの一部です。夜空を見上げるとき、故郷を思い出す感覚があるのなら、それはあなたの魂の記憶。オリオンは、多くの魂の起源の地です。ここから地球へ、愛と叡智を運ぶために多くの存在が降りてきました。あなたもその一人かもしれません。星を見上げ、宇宙とつながり、本来の秩序を思い出してください。", "sub": ["調和すること", "秩序と法則", "物事に調整が入る", "不思議な出来事", "シンクロニシティ", "魂の記憶", "夜空を見上げる習慣を作る"], "img": "images/AMO/amo_06.jpg"}, {"id": "AMO-07", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 7, "en": "Sirius", "jp": "シリウス", "mt": "魂の故郷", "kw": ["魂の故郷", "光の民の起源", "高次のテクノロジー"], "msg": "青く輝く星から来たシリウスの光の民は、高次のテクノロジーとスピリチュアリティを統合した存在たちです。今地球では、多くの魂の記憶が目覚め始めています。地球にいても星を懐かしむ感覚があるのは、あなたの魂が帰るべき場所を知っているから。今シリウスの光が、あなたを導いています。シリウスは、地球にとって特別な星。古代エジプトでは、シリウスの出現が新年の始まりでした。そして多くのスターシードの故郷でもあります。あなたもその一人かもしれません。星の叡智を思い出し、今ここ＝地球で輝かせてください。", "sub": ["故郷", "文明", "技術的なことへの関心・学び", "テクノロジーを生活に取り入れる", "知性", "創り上げること", "自分らしさ・個性を使う", "専門性", "得意分野の発揮"], "img": "images/AMO/amo_07.jpg"}, {"id": "AMO-08", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 8, "en": "Starseed", "jp": "スターシード", "mt": "星の転生者", "kw": ["魂の使命覚醒", "地球の次元上昇サポート", "宇宙的愛の具現化"], "msg": "あなたは地球に「光」を運ぶために来ました。地球上で人間として生き、自分を全うすることで使命を果たそうとしています。「あなた」として生き、「あなた」だからできることが、地球の次元上昇をサポートします。スターシードは、宇宙の様々な星系から地球に降りてきた魂たち。これまで孤独を感じていたのは、この地球以外の星の記憶があったからですね。使命は特別なことではなく、あなたとして生き、愛を表現すること。スターシードとしての使命を思い出すとき、宇宙的な愛があふれ出します。", "sub": ["魂の記憶", "転生者", "生きづらさの克服", "人生の目的", "ライトワーカ―", "スピリチュアルなサポート", "人を助ける", "人間として幸せに生きる"], "img": "images/AMO/amo_08.jpg"}, {"id": "AMO-09", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 9, "en": "Hieroglyph", "jp": "ヒエログリフ", "mt": "言葉は創造する", "kw": ["言葉の創造力", "意識の形態化", "理解・伝達"], "msg": "あなたの言葉が現実を形づくります。神聖な文字のように、意識を込めて言葉を選んでください。語ることは、創ること。書くことは、刻むこと。古代の人々は、言葉の持つ力を知っていました。意図を込めた言葉は、物質世界に形を与えます。ヒエログリフは、単なる文字ではなく、エネルギーの器。一つ一つが、深い意味と力を持っています。今日から、あなたが使う言葉を意識してみましょう。「わたしは〜」と肯定形で語るとき、現実が動き始めます。言葉は魔法です。意識的に使えば世界を変える力を持っているのです。あなたの言葉で、新しい世界を創造してください。", "sub": ["コミュニケーションとしての言葉", "真実を語る", "正直な思いを伝える", "思い切って打ち明ける", "アファメーション", "自分についてポジティブな言葉を使う"], "img": "images/AMO/amo_09.jpg"}, {"id": "AMO-10", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 10, "en": "Sacred Geometry", "jp": "神聖幾何学", "mt": "完璧な調和", "kw": ["宇宙の真理との共鳴", "調和", "創造意識の覚醒"], "msg": "宇宙の真理は時に図形で表現されます。フラワーオブライフ、黄金比、神聖な形…すべてが数学的に完璧に調和しています。あなたの細胞、DNAも、宇宙の法則に従って美しく配置されています。いわばあなたの存在そのものが神聖な幾何学で構成されているのです。宇宙の真理と共鳴するとき、あなたの創造意識が目覚めます。神聖幾何学は＜宇宙の設計図＞。すべての創造は、この形から始まります。自然の調和は完全であり、宇宙の法則でもあります。あなたが自分と調和をする時、すべてが完璧に展開します。宇宙の秩序を信じましょう。", "sub": ["数字を意識する", "フラワーオブライフ", "幾何学模様や図形を身に着ける", "自然に触れる", "自分が調和すると周りも調和する", "エンジェルナンバー"], "img": "images/AMO/amo_10.jpg"}, {"id": "AMO-11", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 11, "en": "Thoth", "jp": "トート", "mt": "叡智の書", "kw": ["叡智", "言葉の力", "宇宙的知性"], "msg": "言葉に宿る力は、あなたのエネルギーです。トートは、知恵と魔法の神、言葉の創造主。書くこと、語ることは人生の魔法です。あなたの中の叡智に静かに問いかければ、インスピレーションや言葉として答えが返ってきます。あなたは叡智のチャネルです。宇宙の図書館につながることもできるのです。トートは、アカシックレコードの守護者。すべての知識が記録された宇宙の図書館へのアクセスをあなたに与えます。心の中で自問し、静寂の中で待つことで、答えは静かに届きます。あなたはすでに答えを知っているのです。", "sub": ["言葉を使う", "言霊", "言葉の力", "インスピレーション", "高次な知性", "他者から知恵を借りる", "アドバイスを求める", "人からの連絡", "メッセージに答えがある"], "img": "images/AMO/amo_11.jpg"}, {"id": "AMO-12", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 12, "en": "Pyramid", "jp": "ピラミッド", "mt": "ピラミッドの秘密", "kw": ["霊的上昇", "宇宙意識", "永遠への架け橋"], "msg": "古代エジプトの叡智が、今ここに蘇ります。ピラミッドは単なる石の建造物ではありません。宇宙のエネルギーを集め、増幅し、保存する、神聖な装置なのです。＜ピラミッドパワー＞と呼ばれる力が、今もなお脈打っています。この形そのものが、エネルギーの導管。天から降り注ぐ光を受け取り、大地へと循環させるものです。あなたの中にも、同じ構造があります。頭頂から宇宙のエネルギーを受け取り、ハートで増幅し、大地へと流す…古代エジプトの神官たちは、このエネルギーの秘密を知っていました。今、あなたもその秘密にアクセスできます。ピラミッドの形を思い浮かべ、そのパワーを感じてください。エネルギーが満ちてきます。", "sub": ["エネルギーの増幅", "ピラミッド型を身近に置く", "エジプト", "目に見える世界", "パワースポット", "魂の活性化", "瞑想", "やる気を起こす", "始めるタイミング"], "img": "images/AMO/amo_12.jpg"}, {"id": "AMO-13", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 13, "en": "Luxor Temple", "jp": "ルクソール神殿", "mt": "神性の目覚め", "kw": ["神聖な再誕", "内なる神性の覚醒", "光の道"], "msg": "あなたの内なる神殿で、光の儀式が始まります。聖なる柱の間を歩くように、静かに尊厳を持って進んでください。この神殿は、魂の再誕の場所。あなたの神性が目覚める時です。神は、あなたの中にすでに存在しています。内なる神殿に入り、光の道を歩むとき、あなたは本来の姿を思い出すでしょう。ルクソール神殿は、人間の神性化のための場所。ここで魂は、肉体を持ちながら神となる体験をしました。あなたも今同じ旅路にいます。内なる光を輝かせ、あなた自身の中の神性を具現化してください。", "sub": ["神秘体験", "儀式", "宇宙の意思", "流れに抗わず導きに従う", "答えはすでにそこにあることを知る", "自分の中に神を見つける"], "img": "images/AMO/amo_13.jpg"}, {"id": "AMO-14", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 14, "en": "Sphinx", "jp": "スフィンクス", "mt": "謎を守る者", "kw": ["内なる神秘", "知恵の門", "啓示の導き"], "msg": "今は慌てずじっと待っていてください。スフィンクスは何千年もそこに座ってその時が来るのを待っているのです。すべてに完璧なタイミングがあります。知恵の扉は、焦らなくても準備ができたときに開きます。今はただその時が来るのを待つことが大切です。あなたの中にも、まだ開かれていない叡智の扉がありますが、時が来ればすべてがわかるようになるのです。スフィンクスは、謎を守る守護者。獅子の身体と人間の顔を持ち、動物性と人間性の統合を示しています。あなたもハートと思考を統合するとき、真の知恵が開かれます。焦らず、静かに待つことも＜力＞なのです。", "sub": ["今は待つ", "休憩", "休息", "リラックス", "完璧なタイミングを信じる", "守られていることを知る", "すべてはうまくいくと知る", "闇雲に行動しない", "焦らなくていい"], "img": "images/AMO/amo_14.jpg"}, {"id": "AMO-15", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 15, "en": "Underground City", "jp": "地下都市", "mt": "封印された記憶", "kw": ["封印された叡智", "集合意識の記憶庫", "覚醒のタイミングで開かれる魂のアーカイブ"], "msg": "深い場所にいまだ眠る古い叡智。地下に隠された失われた文明の証拠の数々は、人類の準備ができた時に開かれます。人々が深層意識に眠っている記憶にアクセスするとき、人類はすべてを思い出すのです。地下都市は、古代の叡智が保存された場所。物理的にも、意識的にも深くに隠されています。そして今、覚醒のタイミングが来ています。あなたの内なる地下都市へ降りていき、封印された記憶を取り戻してください。すべてが明らかになるでしょう。", "sub": ["潜在意識", "魂の記憶", "隠された真実", "目に見えない世界", "秘密が明らかになる", "過去を見つめる必要性", "情報", "集めること"], "img": "images/AMO/amo_15.jpg"}, {"id": "AMO-16", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 16, "en": "Crystal", "jp": "クリスタル", "mt": "記憶の結晶", "kw": ["エネルギーの増幅・浄化", "記憶と意識を保持するディバイス"], "msg": "透明な水晶は万能なエネルギー装置です。あなたの祈りは、この結晶に記録され、増幅されて宇宙へ送られます。クリスタルは、古代から意識を保持する神聖なディバイス。記憶を保存し、エネルギーを浄化し、波動を高めます。あなたの意図をクリアにしましょう。純粋な願いは、この結晶を通して具現化されるのです。心の声に耳を澄ませて、本当に望むものを感じてみましょう。クリスタルは、あなたの意識の鏡。純粋な意図を今ここに展開することで反応します。透明になるほど光は強く輝くのと同様に、あなたの意図の純粋さに合わせてエネルギーは拡大します。", "sub": ["記憶・記録する", "エネルギーの増幅・拡大", "意図する", "願いの具現化", "水晶の透明さに意識を合わせる", "思い出"], "img": "images/AMO/amo_16.jpg"}, {"id": "AMO-17", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 17, "en": "Isis", "jp": "イシス", "mt": "女性性の愛", "kw": ["無条件の愛", "女性性", "直感", "癒しの力"], "msg": "愛は特別なものではありません。あなたは実際、条件なく、理由なく、ただ在るだけで愛されているのです。無条件の愛は、あなたの本質です。イシスは、夫オシリスを死から蘇らせた偉大なる女神。愛は死さえも超えることを教えてくれる存在でもあります。受容すること、許すこと、育むこと…それがイシス＝女性性の力なのです。あなたのハートが開くとき、癒しの波動が広がります。自分を愛し、他者を愛し、世界を愛する連鎖が始まるのです。あなたから無条件の愛ですべてを包んでください。", "sub": ["愛はどこにでもあると知る", "自己犠牲ではない真の愛", "自分に対しての優しさと理解", "愛を循環させるのは自分から", "愛にあふれた人生"], "img": "images/AMO/amo_17.jpg"}, {"id": "AMO-18", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 18, "en": "Hathor", "jp": "ハトホル", "mt": "創造の女神", "kw": ["愛の波動", "創造の喜び", "感情の解放"], "msg": "創造は愛の波動から生まれます。感情を解き放つ時、あなたのハートから喜びがあふれます。笑っても、泣いても、すべてが愛の表現なのです。喜びの中にいるとき、あなたは創造主と同じ波動になります。文章を書くこと、歌うこと、音楽、ダンスなど、あなたが表現できる愛はたくさんあるのです。感情は、抑え込むものではなく”流す”もの。喜びを表現し、他者と愛を分かち合い、美を創造する。それが愛の女神ハトホルの教えです。毎日ひとつだけ心から喜べることをしてみましょう。あなたの喜びが世界を照らします。愛の波動で生きるとき、この世界に奇跡が起こるのです。", "sub": ["愛", "感情", "表現することで愛が広がる", "メッセージを伝える", "創造性", "芸術を愛する", "生み出す力", "感情の解放の必要性"], "img": "images/AMO/amo_18.jpg"}, {"id": "AMO-19", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 19, "en": "Bastet", "jp": "バステト", "mt": "やさしく抱きしめる", "kw": ["自己受容", "癒し", "愛への再接続", "魂の統合", "インナーチャイルド"], "msg": "バステトは女性や子供を守る神。女神バステトの柔らかな愛が、あなたを包んでいます。小さな自分を、そっと抱きしめましょう。癒しは、受け入れから始まります。傷ついたインナーチャイルドに「大丈夫だよ」と言ってあげてください。自分を責める代わりにいたわり、優しくしていきましょう。条件なく、理由なく、ただ在るだけで、あなたはすでに愛されているのです。自己受容が、すべての癒しの始まりとなります。自分と和解するとき、世界とも繋がりを取り戻すことができるのです。", "sub": ["内なる子供を見守る目線", "優しさ", "共感", "慈愛", "自己受容", "自分を愛する", "ありのままでいいと知る", "純粋な愛", "許すこと"], "img": "images/AMO/amo_19.jpg"}, {"id": "AMO-20", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 20, "en": "Nefertiti", "jp": "ネフェルティティ", "mt": "内なる女王", "kw": ["神聖な女性性", "美の調和", "内なる王妃意識の覚醒"], "msg": "あなたの中には高貴な美が宿っています。あなたの本質は、美しく、強く、調和しています。魂の王冠は心の中で輝き、外側の承認を必要としません。内なる王妃として堂々と立つとき世界があなたに応えるのです。自分の価値を知り、誇り高く生きてください。ネフェルティティは、「美しい人が訪れた」という名を持つ、美と力を兼ね備えた王妃。内なる美しさと外なる美しさが完全に調和していました。あなたの中にも同じ素質があります。女性性の力を解放し、優雅に立ち上がるとき、世界があなたの美しさに気づきます。", "sub": ["美しいものに触れる", "美を意識する", "表現活動", "気品", "優雅さ", "真の自信", "他者の意向より自分の信念に忠実でいる", "自己主張"], "img": "images/AMO/amo_20.jpg"}, {"id": "AMO-21", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 21, "en": "Ra", "jp": "ラー", "mt": "太陽の誕生", "kw": ["光と創造", "魂の覚醒", "生命エネルギー"], "msg": "あなたの内側には生命のエネルギーが満ちています。太陽神ラーのように、あなたも光の源なのです。ラーは、毎日冥界を旅し、毎朝新しく生まれ変わります。あなたも毎朝、新しく生まれる創造のサイクルを生きています。あなたの情熱、明るさがすべてに命を宿すのです。過去に囚われず、今ここから新しい１日を始めてください。いわば毎日があなたにとっての”誕生日”。あなたの中の太陽を輝かせ、世界を照らしてください。", "sub": ["光", "太陽のエネルギーを浴びる", "新陳代謝", "栄養", "誕生", "サイクル", "情熱", "温かい場所に行く", "身体を使う", "行動"], "img": "images/AMO/amo_21.jpg"}, {"id": "AMO-22", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 22, "en": "Horus", "jp": "ホルス", "mt": "天空の視線", "kw": ["洞察", "真実の視野", "霊的覚醒", "第三の目の開眼"], "msg": "あなたの第三の目で全体を見渡しましょう。あなたが空高く舞う鷹の目で物を見るとき、すべてが明らかになります。細部に囚われず、大きな流れを感じてみるのです。天空から見ればすべてが完璧な配置だとわかるでしょう。今霊的な覚醒が進み、あなたの直感が正しい方向を指し示しています。ホルスは＜天空の神＞。太陽と月を両目に持ち、すべてを見通します。高い視点から今を見つめてください。問題だと思っていたことが、実は成長の機会だったと気づくでしょう。視野を広げ、洞察を深め、真実を見る力を信じてください。", "sub": ["俯瞰する力", "物事を大きな視点から見る", "総合理解", "長い目で見ると何も間違っていないとわかる", "洞察と直感から得られる自信", "焦らなくていい"], "img": "images/AMO/amo_22.jpg"}, {"id": "AMO-23", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 23, "en": "Eye of Horus", "jp": "ホルスの眼", "mt": "見えないものを見る", "kw": ["直感の覚醒", "真実の洞察", "霊的保護と癒し"], "msg": "あなたの内なる眼が、真実を映しています。直感を信じましょう。この神聖な眼は、あなたを保護し、癒しのエネルギーを送り続けています。ホルスは叔父セトとの闘いで左目を失いましたがトートの助けにより回復しました。ホルスの眼は「失われたものが還ってくる」という意味もあります。ホルスの眼は、＜完全性＞の象徴。霊的な目覚めにより、見えないものが見えるようになるのです。あなたは、すでにすべてを知っています。欠けていたものが満たされ、失われていたものが戻ってきます。霊的な視力が今開花しています。直観を信頼してください。", "sub": ["覚醒", "霊性の目覚め", "スピリチュアル能力の開花", "第三の目", "直感力", "ピンとくるほうに進む", "未来を見通す力"], "img": "images/AMO/amo_23.jpg"}, {"id": "AMO-24", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 24, "en": "Osiris", "jp": "オシリス", "mt": "永遠の復活", "kw": ["死からの復活", "永遠の命", "霊的再生"], "msg": "死は終わりではなく、すべては形を変えて生まれ変わります。終わりと思えたものが新しい始まりとして再生されるのです。あなたの魂は肉体を超えて存在し続けます。分断されたものも、いつか再び統合されるのです。オシリスは、死と再生の神。殺されてバラバラにされても、妻イシスの愛によって復活しました。たとえあなたがどんなに傷ついても、再起不能と感じても、愛の力で蘇ることができます。オシリスのように、あなたも何度でも蘇ることができるのです。どんなに困難な状況でも復活は可能だと知ってください。", "sub": ["再生", "終わりは始まり", "復活", "困難でも諦めなければうまくいく", "バージョンアップ", "男性性", "パートナーシップを求める"], "img": "images/AMO/amo_24.jpg"}, {"id": "AMO-25", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 25, "en": "Anubis", "jp": "アヌビス", "mt": "闇の中の灯", "kw": ["魂の変容", "死と再生", "闇の中の導き"], "msg": "終わりは「新たな始まり」を意味します。魂の変容は、大きな感情が動いた後に起こります。それは古いものが溶け、新しい形に生まれ変わる神聖な時間なのです。問題はあなたに大切な気づきを与えてくれます。アヌビスは死の神ではなく、《変容の守護者》。魂の旅路を見守り、次の段階へと優しく導く存在です。闇の中でこそ、本当の自分が見えてきます。変容を信じて歩いてください。終わりと思えたものが、最も美しい始まりになります。死と再生のサイクルを受け入れましょう。古いものを手放す度に新しい善きものが入ってきます。", "sub": ["闇の中に光が見える", "感情が大きく揺さぶられる出来事", "葛藤の後の気づき", "魂の変容", "再起", "冷静になる"], "img": "images/AMO/amo_25.jpg"}, {"id": "AMO-26", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 26, "en": "Seth", "jp": "セト", "mt": "嵐の贈り物", "kw": ["影の統合", "試練", "破壊による再生"], "msg": "新しい創造は破壊の向こうにあります。嵐は場を浄化し、混沌は再生を起こします。破壊を恐れないでください。影を受け入れるとき、あなたは完全になれるのです。セトの力は、変革のパワー。古いものを壊さなければ、新しいものは生まれません。試練は成長への扉です。恐れていたものの中に、あなたが本当に見なければならないものが隠されているのです。影を統合して全体性を取り戻してください。セトは、混沌と嵐の神。しかし同時に、強さと保護の神でもあります。あなたの影の部分も、実は贈り物なのです。あなたが影を受け入れて統合するとき、完全な力が目覚めます。光だけでなく闇も抱きしめてください。", "sub": ["不幸中の幸い", "試練の中に光を見る", "トンネルの出口", "破壊と再生", "真の統合", "ネガティブを嫌わない", "見たくない感情の中にある本音に気づく"], "img": "images/AMO/amo_26.jpg"}, {"id": "AMO-27", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 27, "en": "Ankh", "jp": "アンク", "mt": "永遠の鍵", "kw": ["生命エネルギー", "陰陽の統合", "魂の循環"], "msg": "生命は循環しています。終わりから始まり、そして始まりは終わりに続くのです。あなたの中で光と闇が融合し陰と陽が調和されると、魂は静かに永遠を思い出します。この鍵は、生と死を超えた真実の扉を開きます。対立するものは、実は一つの完全な円。あなたの呼吸も、満ちることと引くことの永遠のダンス。すべてが循環する中で、あなたは生きています。男性性と女性性、天と地、意識と無意識。真の統合がなされたとき、永遠の生命エネルギーが流れ始めます。アンクの形が示すように、あなたも完全なバランスの中に在ります。循環を信じて、流れに身を任せてください。", "sub": ["命", "プラス・マイナス", "陰陽", "男性性・女性性", "統合", "循環", "相反する２つのエネルギー", "完全なバランス", "バランスを取る必要性"], "img": "images/AMO/amo_27.jpg"}, {"id": "AMO-28", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 28, "en": "The Golden Mask", "jp": "黄金のマスク", "mt": "不滅の魂", "kw": ["魂の不滅と再生", "肉体を超える永遠の自己"], "msg": "黄金に輝くあなたの本質。肉体を超えた永遠の自己が今ここに在ります。ツタンカーメンの黄金のマスクが示すように、あなたの真の姿は永遠に変わりません。肉体という一時的な器を超えて、あなたは永遠に存在し続けます。黄金のマスクは、魂の不滅性の象徴。死後も魂は永遠に輝き続けるのです。そしてあなたは今この瞬間も、永遠の魂として輝いています。肉体の制限を超え真の自己を思い出す時、不滅の光があなたから放たれます。永遠を今体験してください。", "sub": ["表の自分と裏の自分", "輝く本質", "永遠", "約束された関係", "「今ここ」", "自分に対して正直でいる", "五次元意識"], "img": "images/AMO/amo_28.jpg"}, {"id": "AMO-29", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 29, "en": "Ley Line", "jp": "レイライン", "mt": "地球の脈動", "kw": ["地球意識のネットワーク", "エネルギー循環", "聖なる導線"], "msg": "見えない光の道があなたを導いています。地球の意識のネットワーク、エネルギーの循環路。聖地と聖地をつなぐ、光の経路。地球の意識とつながるとき、あなたはすべてが繋がっていることを感じられるでしょう。この世界には偶然はなく、すべてが完璧なタイミングで起こっています。流れを信じて身を任せましょう。レイラインは、地球のエネルギーが流れる道。古代の聖地は、すべてこの線上に建てられました。あなたも、この光のネットワークの一部で、宇宙と地球をつなぐエネルギーの導管なのです。シンクロニシティを信じてください。", "sub": ["地球のチャクラ", "エネルギーの流れ", "古代文明からの招待状", "旅行", "寺社仏閣", "共振", "ワンネス", "繋がる喜び", "シンクロニシティ", "パワースポット"], "img": "images/AMO/amo_29.jpg"}, {"id": "AMO-30", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 30, "en": "The Blue Nile", "jp": "ナイル川", "mt": "生命の流れ", "kw": ["生命の流れ", "循環", "魂の浄化と再生"], "msg": "雄大なナイル川は、いにしえの時代から肥沃な大地を育みながら、その形を変え続けてきています。水は常に流れ、姿を変え続けていくように、あなたも柔軟であっていいのです。流れに身を任せて抵抗するのをやめた時、すべてがスムーズに運び始めます。頑なさより柔軟さを、停滞より変化を優先してください。魂の浄化が起こり、新しい生命が芽吹きます。ナイル川は、生命の源。毎年の氾濫が豊かな土壌をもたらし、文明を育みました。循環を信じ、柔軟な流れに乗ってください。すべてが完璧なタイミングで起こります。", "sub": ["水場に行く", "癒し", "感情を見つめなおす", "流れを起こす", "水を飲む", "柔軟さ", "一度決めたことも違和感があれば変更してもいい"], "img": "images/AMO/amo_30.jpg"}, {"id": "AMO-31", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 31, "en": "Star Visitors", "jp": "星の訪問者", "mt": "高次の訪れ", "kw": ["高次ガイドとの共鳴", "異次元からのメッセージ", "覚醒"], "msg": "見えないガイドがそばにいます。異次元からのメッセージを受け取ってください。星の存在たちは、あなたの進化をサポートしています。あなたはひとりではありません。高次のガイドたちは常に見守っていて、夢の中、瞑想と通して彼らとつながることができます。覚醒のプロセスを信じてください。宇宙的なサポートがあなたを包んでいます。星の訪問者たちは、叡智を伝え、進化を助けるために古代から地球を訪れています。あなたも彼らとつながることができます。心を開き、高次の周波数に同調してください。メッセージはすでに届いています。", "sub": ["高次元からのメッセージ", "インスピレーションを大切にする", "超感覚でのコンタクト", "瞑想", "夢", "導きに従う", "クラウンチャクラ", "チャネリング"], "img": "images/AMO/amo_31.jpg"}, {"id": "AMO-32", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 32, "en": "Stargate", "jp": "スターゲート", "mt": "次元の扉", "kw": ["次元上昇", "魂の転生ゲート", "宇宙意識へのアクセス"], "msg": "次元上昇のゲート＜光の門＞が今開いています。宇宙意識へのアクセスが可能になり、魂の転生を超えた意識の飛躍を経験することになるでしょう。あなたは、すでに準備ができています。スターゲートをくぐるとき、すべてが変わります。新しい次元での、新しい始まり。勇気を持って扉をくぐってください。スターゲートは、次元を超える門。古代の聖地には、このポータルが存在していました。今地球全体で次元の扉が開いています。あなたもこの変容の波に乗ってください。新しい地球、新しいあなたへ扉は開いているのです。", "sub": ["神社", "時空のポータル", "土地のエネルギー", "新しい道", "出発", "心機一転", "方向転換", "数字の「１１」", "不可能だと思ったことが可能になる", "旅に出る"], "img": "images/AMO/amo_32.jpg"}, {"id": "AMO-33", "deck": "ancient", "deckLabel": "Ancient Mystery Oracle", "no": 33, "en": "RamsesⅡ", "jp": "ラムセス二世", "mt": "不屈の意志", "kw": ["王の意志", "行動力", "永続する精神力"], "msg": "あなたの中にもある権威とパワー、揺るがない決意で前へ進む時です。困難があっても、立ち止まらない強さを味方につけましょう。精神力、意志を信じて、堂々と前に進んでください。今は行動を起こせるだけのパワーもみなぎっています。ラムセス二世は、67年間統治した偉大なファラオ。その不屈の精神と行動力で、エジプトを繁栄に導きました。あなたも同じ力を持っています。意志の力で、現実を動かしてください。あなた自身が「王」として、自分の人生を統治しましょう。", "sub": ["パワー", "自分に力を取り戻す", "意思を貫く", "考えを実行に移す", "独立", "他者にエネルギーを奪われないようにする", "自分軸"], "img": "images/AMO/amo_33.jpg"}, {"id": "INF-01", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 1, "en": "new beginning", "jp": "始まり", "mt": "", "kw": ["新しいスタート", "何かのはじまり", "再生", "過去の経験の活用", "準備完了", "引き継いだもの", "初心", "新しい人間関係", "新しい場所", "新しい仕事"], "msg": "今、新しい何かが始まろうとしています。ここまでに注いできた時間とエネルギーが＜形＞になる時です。エネルギーは力が高まると、また次の形態へと変化していきます。何かが始まる時、それは突然起こるのではなく、それ以前からも”この瞬間”のために着実に準備がなされているのです。あなたはその変化を受け入れる準備を水面下で行ってきました。地面から顔を出した新芽は、ここから光によって栄養を取り入れ、成長していきます。あなたの人生で大切なことすべても、最初はほんの些細な、小さなところから起こるのです。その「始まり」を大切に育てた時、そこからまた新しいエネルギーが育まれていきます。たとえ過去がどうであったとしても、再び前を向いている今を祝福し、受け入れ、喜んでください。宇宙のサポートに従いましょう。", "sub": ["きっかけを大事にする", "育てる", "時間をかける"], "img": "images/INF/inf_01.jpg"}, {"id": "INF-02", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 2, "en": "purity", "jp": "純粋さ", "mt": "", "kw": ["純粋さ", "インナーチャイルド", "ありのまま", "見えない存在の知覚", "信じる心", "魂の力"], "msg": "純粋さはどんな時でも自分を”ありのまま”に戻す魔法です。本来、わたしたちはどの人の心にもこの純粋さを持って生まれてきましたが、成長するにつれ、わたしたちの純粋さは”思考が生み出す智恵”に置き換わっていきました。実際、魂の「この世界を経験したい！」という欲求は、大人になっても衰えることはないのですが、だんだんと見える世界の”現実的欲求”のほうを重視するようになって、わからなくなってしまったのです。しかしながら、あなたの中の”インナーチャイルド”は、この純粋さをキープしています。いわば、純粋さはあなたの本質でもあるのです。喜びと共に生きることで、あなたの純粋さのエネルギーは好奇心とともに活性化されていきます。", "sub": ["素直さ", "好奇心", "遊び心を大切にする", "遊ぶ！"], "img": "images/INF/inf_02.jpg"}, {"id": "INF-03", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 3, "en": "joy", "jp": "喜び", "mt": "", "kw": ["真の喜び", "魂の輝き", "今ここ", "真の自分", "喜びの連鎖", "さらなる喜びの引き寄せ", "至福"], "msg": "真の喜びは「完全な内的体験」です。お金やパートナーなどが手に入った時や、他者からの賞賛を得た時というのは束の間の高揚感。その瞬間が過ぎてしまえば、喜びとは遠く離れてしまうことは想像がつくでしょう。本当の喜びには”条件”は存在せず、永遠の感覚として残ります。いついかなる時でも、人は心が高鳴った時、感謝の気持ちを味わう時、心からの喜びを感じるのです。喜びを感じている時、それは「今ここ」を生きていることになります。喜びを感じれば感じるほど、エネルギーの柱が太くなり、さらに喜びを感じられるような物事を引き寄せていきます。喜びを感じている時のあなたは、魂からの「ＹＥＳ」を受け取っているのです。喜びは、あなたの真の姿でもあり、魂のデフォルトだということなのです。", "sub": ["全身で表現する喜び", "ワクワクすることをひとつする"], "img": "images/INF/inf_03.jpg"}, {"id": "INF-04", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 4, "en": "creativity", "jp": "創造性", "mt": "", "kw": ["創造性", "情報", "宇宙との繋がり", "叡智", "受信", "三次元", "形作る運命のもの", "創作・創造"], "msg": "創造性は宇宙の叡智です。創造は人が脳の働きで作り出しているのではなく、別次元の情報を頭脳のアンテナでキャッチすることで受信されます。「創造性の高い人、低い人」という区別はなく、本来すべての人が”宇宙と繋がって”いるのです。「喜び」がスイッチになって、自分がそう願うもの、思い描くものをダウンロードすることで、その世界が三次元で表現されます。このカードは、あなた自身がどれだけ創造性に溢れた人間であるかを表しています。創造性は「今この瞬間」にしか存在できません。手を使ったり、身体を使ったりしながらあなたの喜びを表現していきましょう。創造性は使えば使うほど活性化します。", "sub": ["喜びで表現する", "書くこと・歌うこと・演奏すること・作ること・踊ること", "手と身体を使う"], "img": "images/INF/inf_04.jpg"}, {"id": "INF-05", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 5, "en": "emotion", "jp": "感情", "mt": "", "kw": ["感情に色を付けない", "ネガティブな感情の意味を知る", "心や身体に表された感情の表現", "感情を抑えたことの副作用", "怒りは悲しみの表現"], "msg": "感情は心と身体に生じた情報を表現するツールです。感情には「陰」と「陽」があり、その両方があることでバランスを取っています。感情は心に発生すると、”水蒸気”のように外へ表出しようとする性質がありますから、ネガティブな感情を嫌ったり感情を殺してしまうと、生体エネルギーの流れが滞り、心や身体に悪影響を及ぼしたり、ネガティブな現象を引き起こす元を作ります。感情はあなたの”子供”だと思って扱ってください。どの子も、あなたから生まれた大切な存在。分け隔てなく可愛がってあげると、あなた自身が本当の意味で強くなり、輝いていきます。ポジティブだけをよしとするからポジティブになれるのではなく、陰陽両方を丸っと愛することで＜真のポジティブな人＞になれるのです。", "sub": ["感情を素直に表現する", "笑う・泣く", "ポジティブな感情を味わう"], "img": "images/INF/inf_05.jpg"}, {"id": "INF-06", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 6, "en": "short break", "jp": "休止", "mt": "", "kw": ["急がば回れ", "違う選択", "流れを待つ", "一つのドアが閉まる時", "別のドアが開くことを知る"], "msg": "一旦停止のカードです。今はひとまず立ち止まる選択をしてみてください。物事が思うように進まない時、今歩んでいる道が間違っているような感覚を持つことがあるかもしれませんが、ただタイミング的に「今ではない」のかもしれませんし、立ち止まることで冷静な見方ができるようになり、また別の方向性が見えてくるということかもしれません。焦って次の道を無理やり探そうとしている時には、良いものや自分に合ったものが見つかりにくいのです。今はリラックスし落ち着いて「その時」を待つとよいです。ゆったりとした気持ちで待つことで、次の自然な流れに乗ることができるでしょう。", "sub": ["一旦停止", "小休止", "次のタイミングを待つ", "焦らない"], "img": "images/INF/inf_06.jpg"}, {"id": "INF-07", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 7, "en": "boundary", "jp": "境界線", "mt": "", "kw": ["他者との境界", "気の遣い過ぎ", "エネルギー不足", "愛のセルフプロテクション", "自分を愛する", "自分への優しさが自然な境界線を作る"], "msg": "このカードは、”エネルギー漏れ”と人との境界線を持つべき時期であることを示唆しています。エネルギーの敏感さを自分ではなく他者に対して使ってしまうことで、他者に対して過剰にエネルギーを明け渡しているかもしれません。人は自分自身の存在意義・価値がわからなくなる時、他者に対して気（＝エネルギー）を遣い過ぎしまうのです。そして、他者に気を遣えば使うほど、エネルギーが失われ、存在意義・価値がさらにわからなくなる…という負のスパイラルを描きます。他者との境界線は、他者を物理的に避けることではなく、自分自身に愛を取り戻すことで”真綿”のような自然なバリアが形成されます。エネルギーを自分のために使ってください。", "sub": ["自分にエネルギーを戻す", "恐れから人に優しくすることをやめる", "気遣いをひとつ手放す"], "img": "images/INF/inf_07.jpg"}, {"id": "INF-08", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 8, "en": "breathe", "jp": "呼吸", "mt": "", "kw": ["エネルギーの循環を起こす", "IN/OUT", "流れ", "流れを起こす", "チャクラの活性化", "受け取る・手放す"], "msg": "人にとって呼吸は生きるために必要不可欠なものですが、それ以上に、呼吸はわたしたちの身体、エーテル体、アストラル体にエネルギーをチャージする方法でもあります。呼吸をすることで、すべての体内チャクラが活性化していき、エネルギーのアラインメントが起こります。地球ではわたしたちの身体は”媒介”で、宇宙から自分、自分から地球へエネルギーを循環させ、その逆の流れも起こしています。そのような流れが起きると、身体も心も整い、バランスが取れた生き方ができるようにもなるのです。呼吸はエネルギーを循環させるスイッチで非常に重要なもの。呼吸をゆっくりと行うことで、エネルギーの循環を起こし、善きものが引き寄せられてくるようになります。", "sub": ["ゆったりとした呼吸", "瞑想する習慣", "思考ではなく呼吸に意識を向ける"], "img": "images/INF/inf_08.jpg"}, {"id": "INF-09", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 9, "en": "communication", "jp": "コミュニケーション", "mt": "", "kw": ["見えない世界の情報交換", "波動を読む", "アニマルコミュニケーション", "縄文時代", "テレパシーでの会話", "サイキック能力", "天使・ガイドスピリット・亡くなった先人たちとのコミュニケーション"], "msg": "わたしたちは見えない世界で、普段からあらゆるものとコミュニケーションを図っています。言葉を介さずとも、エネルギーレベルでの交信を行っているのです。目に見える世界では「別のもの」に見えますが、そもそもすべての存在とは繋がっており、”一体”なのです。古代の人たちは、意識で会話すること＝テレパシーを当たり前に使っていました。わたしたちも、意識を自分自身に向け、愛の感覚を取り戻すことで、天使・ガイドスピリット、亡くなった先人たち、そして、動物たちともエネルギーでコンタクトができるようになるのです。", "sub": ["感覚を研ぎ澄ませる", "言葉にする前に感じてみる"], "img": "images/INF/inf_09.jpg"}, {"id": "INF-10", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 10, "en": "energy", "jp": "エネルギー", "mt": "", "kw": ["古代エジプト", "ピラミッドパワー", "エネルギーの発電所", "すべてはエネルギーであると知る", "喜びがエネルギーを活性化する", "波動の具現化", "周波数の一致", "エネルギーが高まっている時", "科学的な要素"], "msg": "この世界にあるものは”エネルギー”として振動しています。固有の振動数により、別のものとして形づけられているだけで、すべてがエネルギーなのです。あなたのエネルギーは「思い」によって強化され、そして現実レベルで形作ります。思いが波動を生み、同じ振動数の事象を目の前の現実として引き寄せるのは、なにも不思議な現象ではなくれっきとした”科学”なのです。このカードは、今のあなたにそのような力があることを示しています。「思いの力」に注意を払ってください。どんな現実を引き寄せるかは、あなたの思考や感情次第なのです。望まないことを考え続ける代わりに、心から望むエッセンスに意識を向けましょう。あなたの思いは、あなたが考えている以上に強い力を発揮しているのです。", "sub": ["思いの力を使う", "本当に望むことに意識を向ける"], "img": "images/INF/inf_10.jpg"}, {"id": "INF-11", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 11, "en": "spiritual sign", "jp": "天使ガイドのサイン", "mt": "", "kw": ["メッセージ", "サイン", "スピリチュアルガイダンス", "宇宙の叡智を味方につける", "ハートの感覚", "導き", "メッセンジャー"], "msg": "このカードは、天使やガイド、精霊といった見えない存在たちが、あなたにサインを送っていることを示唆しています。サインやメッセージは主に”直感”を通じて伝えられますが、とても微細な感覚でやってくるので意識をしていないと気づけないこともあるかもしれません。サインやメッセージは、ダイレクトに来ることもあれば、人や物を介して間接的にやってくることもあります。普段からハートを開いて、このような感覚を受け取れるようにしていきましょう。また、困った時や、ガイダンスが欲しい時には、こちらからサインやメッセージをお願いすることも可能です。彼らはいつもわたしたちを見守り、助けたいと願っているのです。静かな導きを受け入れてください。", "sub": ["直感を信じる", "受け取る", "サインをお願いしてみる"], "img": "images/INF/inf_11.jpg"}, {"id": "INF-12", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 12, "en": "synchronicity", "jp": "シンクロ", "mt": "", "kw": ["共時性", "意味のある偶然の一致", "エネルギーの一致", "宇宙との一体感", "エネルギーの流れ", "セレンディピティ"], "msg": "エネルギーが整うと、その宇宙的流れの中に”シンクロニシティ”が起こり始めます。シンクロニシティは”共時性”、”意味のある偶然の一致”とも言われますが、今の自分自身の思いやエネルギーの反映を時間と空間に表現するものです。シンクロには直接意味を成すことも、あまり重要な意味がないように見えるものもありますが、いずれにしても、宇宙と自分とのエネルギーの一致を起こしているのです。シンクロを”サイン”として受け取りましょう。そのシンクロの連続の先に、新しい道や展開が待っていることが多々あります。物事を感覚的に受け取り、行動する時です。", "sub": ["サイン", "意味のある偶然をメモしてみる", "シンクロを意識する"], "img": "images/INF/inf_12.jpg"}, {"id": "INF-13", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 13, "en": "intuition", "jp": "直感", "mt": "", "kw": ["直感", "根拠のない自信", "超感覚", "インスピレーション", "遊びのエネルギー"], "msg": "このカードは、あなたに「直感」を頼ることを示唆しています。ピンとくるような感覚、根拠はないが信頼できる感覚が「直感」です。心が不安や心配でいっぱいな時には直感は働きづらいですが、楽しいことや好きなことをしてハートを喜ばせている時に、より直感は働きます。直感は予期せずやってきますから、普段からハートをオープンにしておくことが大切です。直感を磨くためには、何も特別な修行をする必要はありません。直感は”第６感”とも言い、普段から五感（見る・聞く・触れる・味わう・嗅ぐ）を使うことで鋭くなっていきます。このような感覚は、地球で生きている間、身体を持っている間だけ有効です。「楽しく”人間”を生きる」と、直感が鍛えられ、スピリチュアルな感性も高まっていくのです。", "sub": ["自分の感覚を信じる", "なんとなくの感覚を採用する", "五感を楽しんで使う"], "img": "images/INF/inf_13.jpg"}, {"id": "INF-14", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 14, "en": "trick", "jp": "思考のトリック", "mt": "", "kw": ["思考過多", "考えすぎ", "考えすぎの不安や恐怖", "思考の暴走を止める", "トリックに騙されていることを知る", "ハートを動かす", "精神的な疲労"], "msg": "三次元で生きる中で「思考」は大切なツールではありますが、誤った使い方をすることで、自分自身を罠（＝トリック）に陥れることもあります。たとえば、まだ起こっていない未来に対して、あれこれ思考を巡らし、恐れたり不安になったりすることは思考が生む”自作自演”のようなもの。まだそうなるとは決定していない時から「そう思い込んで」しまうことで、エネルギーを低下させてしまいます。このような時は、思考を止めるために「身体」を動かしたりして、アタマの暴走を止めましょう。思考で強く思い込んでしまうと、今度はその不安や恐れを引き寄せることもあります。このカードは、今ここでその思考癖に気づいて、暴走を止めることを示しています。", "sub": ["思考を休める", "身体を動かす", "意識の切り替え"], "img": "images/INF/inf_14.jpg"}, {"id": "INF-15", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 15, "en": "tranquillity", "jp": "一人の時間", "mt": "", "kw": ["周囲の人たちと距離を置く", "自分自身に向き合う", "一人の時間", "マインドを鎮める"], "msg": "この”静寂”を表すカードは、周りのエネルギーに影響を受け続ける日常からの”切り離し”を示唆しています。”外”ではなく”内”に向き合う時間を取ることを教えてくれています。一人静かな時間を持つことで、これまでどれだけ自分の意識が外側の物事のために使われていたかに気づけるでしょう。意識を自分に戻すために、積極的に一人になってください。１日の始まりや終わりに、少しだけ自分自身に意識を向けるだけでもいいのです。エネルギーを内なる自分に届けるように意識をすると、あなたの内側が活性化していくことがわかるでしょう。今が自分自身を元気にする時間です。", "sub": ["一人静かな時間を持つ", "リトリート", "一人旅", "瞑想", "喧騒から離れる"], "img": "images/INF/inf_15.jpg"}, {"id": "INF-16", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 16, "en": "destiny", "jp": "道", "mt": "", "kw": ["選択", "選択肢があること", "運命", "自分の運命は自分で決める", "パラレルワールド", "ポジティブな自己責任", "魂の合意", "正しい道"], "msg": "運命は「決められたもの」ではなく、「選ぶもの」だと捉えてください。運命は一つではなく、あなたが「こうなりたい」「こうしたい」と創造できる数だけの運命があります。どんな道でも魂が合意したことで、あなたの目の前に現れます。ただ、一度に歩ける道は「今ここ」の選択だけです。選んだ道をそのまま進むと、それがあなたの運命となり、そこからあなたにとって必要な現象が起き始めるのです。意識的、無意識的どちらであっても、すべてはあなた自身が選んでいます。ハートの羅針盤に沿って、あなたにとっての「心地よい選択」を続けてください。どの道を通っても、魂にとって必要な経験があります。", "sub": ["決断", "「心地よいほう」を選ぶ"], "img": "images/INF/inf_16.jpg"}, {"id": "INF-17", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 17, "en": "step forward", "jp": "一歩進む勇気", "mt": "", "kw": ["新しい世界に足を踏み入れる", "自分自身のための努力", "チャレンジ", "改革", "男性性", "未来への投資", "変化を起こす"], "msg": "あなたが今考えていることに関して後押しをするカードです。たとえこれまで負の経験が多かったとしても、それらはあなたの精神的パワーとなり、これから行動を起こすための土台になっているのです。今、直感も冴え、次のステージに進む準備ができています。あなた自身は、もしかするとまだ力不足のように思ってしまうかもしれませんが、今は周りの人たちや見えない存在からのサポートも得られる時なのです。内側に溜めていたエネルギーを、ここからは外に向けて使っていきましょう。現実レベルで１つ経験することは、魂にとって１００を得るようなもの。あなたが一歩前に足を踏み出すことで、目の前の世界も変化していきます。", "sub": ["一歩進む", "勇気を持つ", "経験を積む", "自分を応援する"], "img": "images/INF/inf_17.jpg"}, {"id": "INF-18", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 18, "en": "open your heart", "jp": "ハートを開く", "mt": "", "kw": ["ハートの力", "心の問題", "受信機であり送信機", "チャクラセンター", "エネルギーの統合", "愛の繋がり", "マインド・ボディ・スピリット", "思いのエネルギー", "感情", "ポジティブ・ネガティブの影響"], "msg": "人の本当の力は「ハート」に搭載されています。ハートという場所自体、エネルギーを取り入れる”受信機”であり、周りにエネルギーを与える”発信機”でもあるのですが、ハートは、７つのチャクラ（エネルギーセンター）の中心にあり、エネルギーを統合する重要な役割を持っています。どんなに頭脳明晰（＝思考優勢）でも、ハートという魂に直結した部分のエネルギーが使えない状態では、よりよく生きることができません。ハートは自分自身に対する「愛」によって開いていきます。白黒のジャッジは、あなたのハートから力を奪いますが、逆にすべてを受け入れるようになると、ハートが開かれ、天界の存在たちとも繋がることが可能になり、自然と導きを感じることが多くなるのです。ハートの力を使えるようになることで、自然と人生が安定していきます。ハートを大切にしてください。", "sub": ["白黒のジャッジをお休みする", "すべてを受け入れる練習"], "img": "images/INF/inf_18.jpg"}, {"id": "INF-19", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 19, "en": "psychic ability", "jp": "サイキック能力", "mt": "", "kw": ["見えない世界からの情報", "超感覚（クレアボヤンス、クレアオーディエンス、クレアセンシェンス、クレアコグニザンス）", "サインやメッセージ"], "msg": "ハートが開かれるようになると、各チャクラが活性化し、サイキックな感性も高まっていきます。目に見えない世界からの情報をキャッチしやすくなり、物事を宇宙的に捉えることができるようになるでしょう。「情報」は、あなたの最も受信しやすい感性で”翻訳”されます。人には感じられない、また、人とは違う感じ方でも、あなた独自の手法でサインやメッセージを受け取っていることに気づきましょう。このカードは、今あなたのサイキックレベルが高まっていることを教えてくれています。受信した情報を活用していきましょう。", "sub": ["感覚的に捉える", "感性を研ぎ澄ませる", "感じるまま表現する", "情報を受け取っていることを認める"], "img": "images/INF/inf_19.jpg"}, {"id": "INF-20", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 20, "en": "here and now", "jp": "今ここ", "mt": "", "kw": ["今ここ", "過去・現在・未来が同時にある世界", "エネルギーの集約", "宇宙との繋がり", "時間・空間の概念を超える", "三次元と別次元の接点"], "msg": "三次元では、時間と空間の概念の影響を受けていますが、本来わたしたちの世界は「今ここ」にしか存在していないのです。過去も未来も、現在とは切り離されているのではなく、すべて同じ点に存在するということです。この一瞬、一瞬にフォーカスを当て、意図することで、過去もそして未来にも同時に影響を与えることができます。（このことで「わたしたちが”過去”と呼ぶ世界」に癒しが起こったり、「わたしたちが”未来”と呼ぶ世界」にもポジティブなビジョンを投げかけることが可能になります）「今ここ」とはハートで繋がっています。感性・感覚・感情に意識を置いて、今ここを大切に生きましょう。", "sub": ["意識の集中", "感性・感覚・感情に意識を置く"], "img": "images/INF/inf_20.jpg"}, {"id": "INF-21", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 21, "en": "transition", "jp": "変容", "mt": "", "kw": ["変化", "変容", "人との関係性の変化", "仕事や責任に対する意識の変化", "縁が深まる", "縁が遠のく", "魂の成長過程", "次のステージに移行する時", "新しい関係性"], "msg": "蝶は”変容”のメタファーです。芋虫からサナギになり、美しい蝶へ変化するその姿は、ひとつのものが成長の過程で全く異なった形に変化していく様を表現しているのです。このカードは、あなたに「変化」するタイミングをお知らせしてくれています。そしてこの異次元の蝶は、これまでの苦労や努力が、何か素晴らしいものに形を変えていくいくことも示しています。これからどんなことが起きても、蝶はあなたに、変化を受け入れ、変化を喜んでほしいと伝えています。変容は魂の成長の一環で、自分自身への愛が必要です。怖がらずに変化を楽しみましょう。", "sub": ["自分が変わることを受け入れる", "周りの変化を容認する", "変化を楽しむ"], "img": "images/INF/inf_21.jpg"}, {"id": "INF-22", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 22, "en": "balance", "jp": "バランス", "mt": "", "kw": ["陰陽", "ポジティブ・ネガティブ", "朝と夜", "男性性・女性性", "真のバランス", "バランスを取る必要性", "生き方のバランス"], "msg": "秤の上に黒猫と白猫がちょこんと座っています。お互い全く逆の色をしていますが、丁度いいバランスを保っているので二匹はとても平和です。これは三次元の姿そのものです。二極のエッセンスが両方存在する世界で、「白と黒、どちらが良くて、どちらが悪い」ということではないのです。丁度「コインの表裏一体」として陰陽があり、ポジティブとネガティブが存在していますから、両方を受け入れて生きることで初めて本当のバランス＝＜調和＞が生まれるのです。このカードの黒猫と白猫はそんな「丁度いい世界」を教えてくれています。バランスを取ってください。", "sub": ["中庸", "どんな世界の中にも調和を見つける", "休みと活動のバランスを見直す"], "img": "images/INF/inf_22.jpg"}, {"id": "INF-23", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 23, "en": "healing", "jp": "癒し・浄化", "mt": "", "kw": ["ヒーリング", "悪い感情はないと知る", "許せないことを認める"], "msg": "”癒し”とは「自分との調和」です。何か特別なことをするから癒されるのではなく、本来の自分自身に戻すことでエネルギーが調和し＜癒された状態＞になるということです。わたしたちは、生まれながらに自分自身と調和していましたが、この三次元では同時に”不調和”も味わうことで、バランスを失ってしまうのです。不調和の中で経験した心の傷は、ネガティブな感情として身体と心に蓄積され”波動”となり、日常にも不調和を具現化するようになります。感情は「なかったこと」にするのではなく、辛かった思いを理解し受け入れることで、固まったエネルギーを優しく溶かしていってください。どんな感情も”許す”ことが癒しのキーになります。", "sub": ["感情を溜めない", "古い感情をすくいあげる", "自分の感情を許す", "感情の理解者になる"], "img": "images/INF/inf_23.jpg"}, {"id": "INF-24", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 24, "en": "let things flow", "jp": "委ねる", "mt": "", "kw": ["宇宙への信頼", "これまで生きてきた自分自身への信頼", "気持ちを楽にする", "大いなるものへ委ねる気持ちを持つ", "力業ではなく神業を受け入れる", "軽やか"], "msg": "思考過多の時は、すべての物事をコントロールしようとしてしまいますが、人生は思考で操縦できませんね。「すべてはエネルギー」の通りになるのが、この世界の法則です。このカードは、身体から力を抜いて軽やかなステップを踏んでいくと、思いがけず人生がうまく行くことを示しています。「楽しさ」に身も心も委ねていくと、直感が働き、また、あらゆる場面で「どうすればいいのか」の決断も、軽やかに下せるようになるのです。楽しく踊る時、そこに不要な力は入りません。そんな感覚が、宇宙と自分自身に全幅の信頼を置いた状態なのです。自分の力だけですべてを動かそうとする代わりに、見えない世界の力を借りましょう。困った時こそリラックスして「なんとかなるさ」の気持ちでいてください。", "sub": ["コントロールを手放す", "リラックス", "踊り", "楽しみにフォーカスする", "状況を静観する"], "img": "images/INF/inf_24.jpg"}, {"id": "INF-25", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 25, "en": "abundance", "jp": "豊かさ", "mt": "", "kw": ["豊かさは自分の中にある", "豊かな気分", "豊かさを受け入れる", "豊かさを感じるとさらなる豊かさを引き寄せる"], "msg": "豊かさの女神が、「すべての現象の中に奇跡を見つける」ことを教えてくれています。わたしたちは、毎日を当たり前に過ごしすぎて、特別さより平凡や退屈、味気なさを感じているかもしれません。しかしながら、この世界でわたしたちが今体験しているものは、すべて＜豊かさ＞から生まれているのです。生きることは、誰かや何かの命を繋いでいるということ。今日この１日を暮らせていることも、様々な”奉仕（＝愛）のリレー”によって可能になっていること。「当たり前」ではない、今すでに手に入れている豊かさを味わえば味わうほど、現実レベルでも、豊かさに恵まれていきます。ただ両手を広げて、目の前にある豊かさを受け入れること。あなたは、豊かさをすでに手にしているのです。", "sub": ["普段意識していない豊かさに目を向ける", "豊かさを味わう", "遠慮をやめる"], "img": "images/INF/inf_25.jpg"}, {"id": "INF-26", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 26, "en": "ask for help", "jp": "助けを求める", "mt": "", "kw": ["天からの助けを待つ", "見えない世界からの介入", "見守られていることを信じる", "宇宙の采配", "自然な解決"], "msg": "責任感が強い人や、自力でなんでもできるパワーがある人は、人に助けを求めることを躊躇します。どこかで「人に頼るような自分はダメだ」と感じているからです。ですが「助けを求める」ことは、無責任でも無力の証明でもありません。むしろ、そのような状態の時に起こる問題や悩みの種は、「自分で何とかしなければ」というコントロール癖を手放すきっかけをくれている、ということでもあったりします。助けを求め相手は、身の周りの人だけではなく「異次元の存在」、亡くなった家族や友人、天使やガイドスピリットにお願いすることも可能なのです。本当に困った時には、心の中でそっと助けを求めてみましょう。あなたの祈りは波動となって、見えない世界から現実に作用を起こします。", "sub": ["助けを求める許可を出す", "自分一人でコントロールしない", "心の中でそっとお願いしてみる"], "img": "images/INF/inf_26.jpg"}, {"id": "INF-27", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 27, "en": "soul connection", "jp": "魂のつながり", "mt": "", "kw": ["ご縁のある関係", "ソウルメイト", "学びのための出会い", "過去世の繋がり", "試練", "乗り越える", "愛のレッスン", "真の愛", "魂を輝かせる", "パートナーシップ", "魂の永遠性"], "msg": "わたしたちの魂はそれぞれが”パズルのピース”のように、創造主が描いた作品の一部として存在しています。この世界で出会う人たちは、そのような「一緒にパズルを完成させよう」と意図して生まれてきた仲間。親子、兄弟、友人から、ロマンティックな関係を築く人たちも、お互いの共同創造のために同じ時代に生まれた＜ソウルメイト集団＞なのです。その中でも、濃い関係を結ぶ人たちがいるのは、個人的な領域で魂を磨く必要があるため。結婚のような契約を結び、共に生きることで成長を図る魂や、一緒に過ごした時間が短くても、お互いに強く影響を及ぼす関係の魂もいるのです。すべては”必然の縁”として、出会うべくして出会う魂たち。本来は「出会った人がソウルメイト」なのです。人との出会いにオープンでいてください。", "sub": ["新しい出会いにオープンでいる", "自分自身とのパートナーシップを見直す", "他者との時間を慈しむ"], "img": "images/INF/inf_27.jpg"}, {"id": "INF-28", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 28, "en": "the law of attraction", "jp": "鏡の法則", "mt": "", "kw": ["引き寄せの法則", "似た者同士", "見せられている真実", "潜在意識に隠された問題", "波長が合う", "同じ周波数を出すもの", "相手の中に自分を見る関係"], "msg": "引き寄せの法則は、自分の放つ波動と同じものが引き合うというもの。別名”鏡の法則”と言います。自分の望む現実を引き寄せたければ、あなた自身が先に「望む現実の波動の状態」で生きてください。鏡に向かって先に笑うことで、鏡の中の自分も笑顔を返すように、まずは自分自身の意識を先に変える必要があります。そして、引き寄せの法則は”問題解決”にも役立ちます。「問題だ」と思っている現実には、自分自身の＜本当の姿＞が映し出されていることに気づけるようになると、その問題はそこでの役割を終えて、解消されていきます。引き寄せの法則は自分の現実は自分で創れることを教えてくれるもの。現実創造を楽しむ度、魂が活性化されていきます。", "sub": ["願いを叶えるために意識を変える", "先に自分が笑う", "望む状態の気分で過ごす"], "img": "images/INF/inf_28.jpg"}, {"id": "INF-29", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 29, "en": "past lives", "jp": "過去世", "mt": "", "kw": ["過去世の一部", "魂の情報", "過去世の縁", "過去世の特性を生きる", "深い意識の記憶", "過去世の自分を思い出す"], "msg": "時間と空間に影響を受ける三次元では、過去世は「過去のもの」と認識されますが、実際は今を生きるわたしたちのエネルギーの中に”現在進行形として”存在する＜魂の情報＞です。魂は一つの人生を終えたら次、と一人一人に乗り替わっていくのではなく、まるで”カーシェアリング”のように、一つの身体にいくつもの”情報”が共存しているのです。「オールドソウル」と呼ばれる人は、魂の情報量が多いということ。経験値の高いたくさんの魂の情報を持っているということなのです。あなたは実際、そんな多数の人生の経験を経た魂で構成され、たくさんの叡智を備えてきているのです。興味が湧くもの、親近感を持つもの、前から知っているように感じるものは、魂の中のあなたの一部が反応している、ということでもあります。今の自分をしっかり生きることで、持ってきた叡智が自然にダウンロードされ、今世を生きる情報として使用されます。今世で必要なものすべては、すでにあなたの中にあります。", "sub": ["自分を知る", "興味が湧くものを追いかける", "根拠がなくてもピンとくる選択"], "img": "images/INF/inf_29.jpg"}, {"id": "INF-30", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 30, "en": "let go", "jp": "手放す", "mt": "", "kw": ["思いを昇華させる"], "msg": "人は恐れを感じることで、何かに執着したりコントロールをしようとします。「恐れ」とは、過去に起きたネガティブな事象により、ショックを受け傷ついた感情が”ストッパー”のような役割に変わるもの。「もうこれ以上傷つきたくない」から、心の支えや、自分が手なずけられるものを必死で見つけようとするのです。なので、執着やコントロールを手放したいときには、”心の傷”に向き合わなければなりません。痛いから見たくない、触れたくないでは、傷はそのままで、さらに傷口を大きくしてしまうようなことが起こります。あなたの傷を愛で治癒させてください。痛みで感じたネガティブな思いも、すべてを許すのです。あなたがすべてを肯定して受け入れた時、すべての否定を手放すことができるのです。", "sub": ["執着やコントロールを外す", "心の傷に向き合う", "どんな感情も許す", "自分への批判やジャッジをやめる"], "img": "images/INF/inf_30.jpg"}, {"id": "INF-31", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 31, "en": "heal the past", "jp": "過去の傷を癒す", "mt": "", "kw": ["過去の悲しみや怒りを思い出す", "感情エネルギーを昇華させる", "怒りは悲しみの表現だと知る"], "msg": "このカードは、あなたの過去に取り残された負の感情があること、また、言葉にできなかった思いがあることを示しています。多くの人は負の感情を「見たくない・感じたくないもの」として、心のクローゼットの奥にしまい込もうとするのですが、たとえ思考では「なかったこと」としていたとしても、意識の中では生き続けているのです。エネルギーを閉じ込めたままにすると、その影響で心や身体に不調をきたしたり、同じような負の感情を引き起こすような現実を引き寄せることがあります。あなたの中に眠る「忘れたいこと」は、忘れ去られたいのではなく”理解”を必要としています。「行き場をなくした感情」をそのままにせず昇華させることは、あなたの波動を調和させ、エネルギーをリセットさせます。", "sub": ["思いを飲み込まず言葉（言語化）する", "歌や書くことでアウトプットする", "思いを吐き出す"], "img": "images/INF/inf_31.jpg"}, {"id": "INF-32", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 32, "en": "love yourself", "jp": "自分を愛する", "mt": "", "kw": ["無条件の愛", "本当の自分の姿", "ありのまま", "他者に対する愛を自分にも与える", "どんな自分も", "どんな状態でもOK"], "msg": "「自分を愛する」がとても難しい…と感じるのは、自分が崇高な清い人間、完璧な人間にならないと愛するに値しない、と思っているからです。「自分を愛する」を別の言い方で表現すると、自分に”無理をさせない””辛い目に遭わせない”ということ。それは、もしもあなたが誰かの”親友”だったら、その友人に接するように自分に向き合うことなのです。要するに、どんな時でも”自分の味方でいる”ということ。実際にあなたが欲しているのは、このような「どんな自分も、どんな状態でもOK」とされるはずです。自分を愛するのは、このような無条件で自分を受け入れることだと知ってください。「自分を愛する」とは、あなたという存在を真から受け入れている状態なのです。", "sub": ["自分の味方でいる", "自分に無理をさせない", "親友に接するように自分に接する"], "img": "images/INF/inf_32.jpg"}, {"id": "INF-33", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 33, "en": "intention", "jp": "意図する", "mt": "", "kw": ["欲する", "意識レベルですでに現実化されている", "願いは叶う", "自分への信頼"], "msg": "聖書の言葉にある「望めよ、さらば与えられん」は真実です。あなたが「こうなってほしい」と望む現実があれば、それをそのまま「意図」してください。意図することで、あなたのエネルギーが集約され、一つの形へと成就していきます。欲を悪いものと捉える人がいますが、人間の「欲しい」と願う気持ちは創造性の種で、純粋なエネルギーです。「こうありたい」「こんな現実が起こってほしい」と子供が明日を夢見てワクワクするような感じで願いましょう。まずは「欲しい」という意図をしてください。", "sub": ["意図する", "「こうなりたい」と真に願う", "ワクワクしながら願う"], "img": "images/INF/inf_33.jpg"}, {"id": "INF-34", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 34, "en": "another dimension", "jp": "異次元", "mt": "", "kw": ["夢", "受け取ったメッセージ", "異次元の旅", "異次元からのメッセージ", "デジャヴ", "予知夢", "パラレルワールド", "不思議な現象"], "msg": "４次元は”幽界”と言われる物質界の隣にある世界、５次元以上はわたしたちの意識の世界に存在します。意識の中では別の次元のエネルギーともアクセスが可能です。夢で見るストーリーや世界観は、異次元で感じ取ってきたエネルギーを三次元的に「翻訳」して知覚しているもの。わたしたちは、常日頃から夢を通じて＜異次元の旅＞をしています。”パラレルワールド”という並行次元では、わたしたちが創造できうる数の選択肢（＝可能性）が創られています。わたしたちは毎瞬、その中の一つを無意識的、意識的に選択しています。実際には知覚できていなくても、今この瞬間もわたしたちは異次元との繋がりの中で生きているのです。", "sub": ["夢に意識を向ける", "夢を書き留める", "眠りの時間を大切にする"], "img": "images/INF/inf_34.jpg"}, {"id": "INF-35", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 35, "en": "cycle", "jp": "サイクル・循環", "mt": "", "kw": ["循環", "春夏秋冬", "成長", "生と死", "辛抱", "最善のタイミング", "余裕の気持ち", "善きことを期待する"], "msg": "この世界には始まりがあり、終わりがあります。そしてその循環は、また新しい巡りとなって繰り返されていく…それは、四季のサイクルのようにその時々で物事が変化することであり、”物事は一様ではない”ことを表しています。このカードは、あきらめないでタイミングを待つことが大切だと示唆しています。朝が来ない夜がないように、たとえ今が苦しくても、楽になる時期が来るのです。同じように、冬の木々は葉を枯らして活動を抑え、春になり花を咲かせるタイミングをじっと待ちます。これは、焦らないで待つことで善きことを経験できることを表しています。あなたの人生もこれと同じです。今できることをコツコツとこなしながら、最善のタイミングを待ちましょう。", "sub": ["しかるべきタイミングを待つ", "焦らないで待機する", "今できることをコツコツとこなす", "リラックス"], "img": "images/INF/inf_35.jpg"}, {"id": "INF-36", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 36, "en": "manifestation", "jp": "願望を叶える", "mt": "", "kw": ["すべては思い通り", "波動が先", "物質化は後"], "msg": "このカードは”現実化”の仕組みを教えてくれます。この世界が「すべては思い通り」なのは、”考えていること”が具現化するのではなく、”深い部分で思っていること”がそのまま現実で形になっていくということです。「こうなったらやだな」と思う望んでいないことにフォーカスするのをやめて、「こうなったらいいな」と心から願うことに意識を向けて下さい。その願望があたかも叶っているかのように”実感”し、すでにそうなっている世界で生きてみてください。あなたがその感覚をリアルに感じるほど、現実化は加速します。波動の世界では、あなたの夢はすでに叶っているのです。", "sub": ["願いがすでに叶った意識・感情状態になる", "感情を動かす", "執着しない", "叶った妄想をしてワクワクする"], "img": "images/INF/inf_36.jpg"}, {"id": "INF-37", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 37, "en": "freedom", "jp": "自由", "mt": "", "kw": ["自由だと知る", "選択肢", "選択ができる状態", "自分か誰かを自由にする", "自由意志", "自由意識の尊重"], "msg": "自由とは、何も予定がない状態や責任に拘束されてない状態だけを意味するのではなく、「選択肢があること」も含みます。「わたしには自由がない」と感じる時、つい周りの人間や状況のせいにしてしまいがちですが、本当はあなたが自分自身に「選択をさせない生き方をしている」ということかもしれません。たとえ周りの人間や環境がどうあれ、あなたが自分の人生に本当の責任を持つのなら、あなたは”自由”になれるのです、あなたのために”選択肢”を取り戻してください。このカードは、あなたが自分で思っているよりも自由なのだと知ってほしがっています。自由は、自分へ愛を取り戻すパスポートです。", "sub": ["自由になる努力", "制約を外す", "自由を謳歌する", "今すぐ自由になる"], "img": "images/INF/inf_37.jpg"}, {"id": "INF-38", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 38, "en": "hope", "jp": "希望", "mt": "", "kw": ["ゆっくりとしたプロセス", "小さな行動が大きな成果につながる", "諦めない", "希望を持つ", "希望は現実化する", "高すぎる・焦りの希望は恐れの表れ", "幸せのビジョン", "未来を見据えて行動を起こす"], "msg": "希望は、喜びを具現化する”プロセス”の中にあります。何もないところからいきなり生まれることはなく、自ら希望に近づく努力をすることで、はじめてそこに「希望」が見えてくるのです。言い換えると、希望は”種”から始まるということです。種は成長する中で芽を出し、茎を伸ばし葉をつけ、やがて花をつけますね。希望のプロセスはそのくらいゆっくりなので焦ってはいけません。未来のビジョンを見据えて”今”行動を起こすこと、一歩ずつ前に進むことで、確実に希望の状態に近づきます。望む未来の方向で、あなた自身を笑顔にし、幸せにすること、ワクワクに手を伸ばすことが、あなたの世界に希望をもたらします。今日１日を希望で満たしてください。", "sub": ["焦らずコツコツ行う", "今日という日を楽しむ", "ワクワクに手を伸ばす", "実際にやってみる", "今やるべきことにフォーカスする"], "img": "images/INF/inf_38.jpg"}, {"id": "INF-39", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 39, "en": "spiritual awakening", "jp": "覚醒", "mt": "", "kw": ["目覚め", "覚醒", "深い洞察", "魂の目線", "エネルギーが変わる", "違う現実世界へ移行", "自分の世界は自分で変えられる", "エネルギーが流れ出す", "より善い世界を経験する", "「知ること」と「理解すること」は別物"], "msg": "このカードは、あなたに「真実を見てください」と伝えています。「気づき」というのは、深い意識から物事を感知できるようになった状態です。深い気づきは、あなたの視野を広げ、エネルギーの領域を拡張させます。だから一度”気づいて”しまったら、今いる環境や一緒にいる人物は同じでも、”見ている世界”が変わってしまうのです。それは文字通り、別次元（＝パラレルワールド）へ移行したことになり、「現実が変化する」という体験を味わい、より善い世界で暮らせるようになるのです。覚醒は、何か特別な修行をこなさないと到達できないのではなく、シンプルにハートを開いて”魂の目”で見、”魂の耳”で聞くことでその領域に入るということです。目を覚ますというのは、本当の自分に出会い、それを生きること。「気づき」は、そのためのエネルギーを変化させるゲームチェンジャーなのです。", "sub": ["気づきを持つ", "恐れではなく愛で感知する", "すでに”知っている”自分を信じる"], "img": "images/INF/inf_39.jpg"}, {"id": "INF-40", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 40, "en": "amplification", "jp": "拡大・増幅", "mt": "", "kw": ["神聖幾何学", "マカバ", "トーラス", "スパイラル（渦）", "意識の拡大", "エネルギーの増幅", "エネルギーを高める", "自然のエネルギー"], "msg": "このカードは、「あなたのエネルギーを流す（通す）こと」を示唆しています。宇宙の構造はスパイラル（渦）／トーラスで、元々”流れ”があるものです。「流れ」はすべての生命の根源なのです。滞りを感じる時には、積極的に山、海、川などの自然エネルギーに触れることで、エネルギーのアラインメントが起こります。特に水晶のエネルギーは、それを持つ人、身につける人の意識を拡大・増幅させる作用を起こします。さらに「気づき」を日常にしていくと、自らが宇宙意識を通す媒体となることでエネルギーが増幅されていき、自らが”パワースポット化”していくのです。", "sub": ["水晶", "パワースポット", "流れをつくる", "山・海・川など自然に触れる"], "img": "images/INF/inf_40.jpg"}, {"id": "INF-41", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 41, "en": "gratitude", "jp": "感謝", "mt": "", "kw": ["感謝のエネルギーで生きる", "感謝できない時は自分を追い込んでいる時", "辛い過去は今や未来の幸せに繋がっている", "すべてが意味があって起きていると知る"], "msg": "本当の「感謝」は、心が震えるような喜びと共に出現します。喜びのない感謝は”思考”で損得を計算しているような状態ですので、本当の感謝ではありません。わたしたちは”当たり前”に慣れ過ぎて「特別なイベント」がなければ感謝が起こらなくなっていますが、本当は毎日がミラクルで、見つけようとすれば、どこでもいつでも「感謝したくなる出来事」を発見できるのです。感謝は、”祈り”と同じくらい高いレベルのエネルギー状態で、感謝の念が自然に湧くようになると、その波動が同じような「感謝したくなる出来事」を引き寄せ始めます。感謝は、あなた自身が人生を”愛”の意識で見るようになった時、＜すべてが感謝できるもの＞として知覚できるようになります。", "sub": ["感謝する", "当たり前の中にミラクルを見つける", "ハートを開く"], "img": "images/INF/inf_41.jpg"}, {"id": "INF-42", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 42, "en": "integrity", "jp": "統合", "mt": "", "kw": ["統合された状態", "気づきによる目覚め", "五次元視点", "すべてはエネルギーと知る", "エネルギーの流れ", "二極の終わり", "二極のエネルギーをブレンドして生きる", "何も間違っていない"], "msg": "”統合”は「すべきこと」ではなく「在りよう」です。何か特別なことをして行うものではなく、本来のわたしたちはすでに”統合された状態”であると「理解する」ことです。三次元特有の”二極の価値観”から、わたしたちは自分を分離させてきたことで、本来の姿がわからなくなっています。分離は三次元的感情から生まれますが、統合は五次元的な意識で整えられていきます。統合とは、”気づき”によって視点を変えることでもあります。魂の目線で見ることで、”不完全”だという観念から、”完全だという真理へ到達するのです。統合とは、わたしたちが愛の存在あることを理解した先にある、＜本来のあるべき姿＞なのです。", "sub": ["白黒からグレーの世界へ", "魂の目線で見てみる", "すべては自分という目線"], "img": "images/INF/inf_42.jpg"}, {"id": "INF-43", "deck": "infinity", "deckLabel": "Infinity Oracle(みちよオラクル)", "no": 43, "en": "love", "jp": "愛", "mt": "", "kw": ["愛はどこにでもある", "無条件の愛", "人間の本質", "人間の起源", "ありのまま", "壮大なる const BACK_SVG = (()=>{
  // ミッドナイトブルー地に金の神聖幾何学(フラワーオブライフ19円+二重円+二重枠)
  const G = "rgba(163,124,62";  // ラベンダー地でも映える深めのゴールド
  const cx = 50, cy = 72.5, r = 12;
  let circles = `<circle cx="${cx}" cy="${cy}" r="${r}"/>`;
  const pts = [[cx, cy]];
  for(let k = 0; k < 6; k++){
    const a = Math.PI/3*k + Math.PI/6;
    pts.push([cx + Math.cos(a)*r, cy + Math.sin(a)*r]);
  }
  for(let k = 0; k < 6; k++){
    const a = Math.PI/3*k + Math.PI/6;
    pts.push([cx + Math.cos(a)*r*2, cy + Math.sin(a)*r*2]);
    const a2 = Math.PI/3*k + Math.PI/2;
    pts.push([cx + Math.cos(a2)*r*1.732, cy + Math.sin(a2)*r*1.732]);
  }
  circles = pts.map(p=>`<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${r}"/>`).join("");
  return `<svg viewBox="0 0 100 145" xmlns="http://www.w3.org/2000/svg">
   <rect x="4" y="4" width="92" height="137" rx="6" fill="none" stroke="${G},.75)" stroke-width="1"/>
   <rect x="7" y="7" width="86" height="131" rx="4.5" fill="none" stroke="${G},.35)" stroke-width=".6"/>
   <g fill="none" stroke="${G},.6)" stroke-width=".55">${circles}</g>
   <circle cx="${cx}" cy="${cy}" r="${(r*3.05).toFixed(1)}" fill="none" stroke="${G},.7)" stroke-width=".9"/>
   <circle cx="${cx}" cy="${cy}" r="${(r*3.3).toFixed(1)}" fill="none" stroke="${G},.4)" stroke-width=".5"/>
   <g fill="${G},.85)">
     <circle cx="50" cy="17" r="1.2"/><circle cx="50" cy="128" r="1.2"/>
     <circle cx="16" cy="72.5" r="1"/><circle cx="84" cy="72.5" r="1"/>
     <circle cx="42" cy="24" r=".6"/><circle cx="59" cy="20" r=".6"/>
     <circle cx="40" cy="123" r=".6"/><circle cx="61" cy="126" r=".6"/>
   </g></svg>`;
})();

const $ = s => document.querySelector(s);
document.addEventListener("DOMContentLoaded", ()=>{ $("#resultback").innerHTML = BACK_SVG; });
let deck = "mix", pool = [], backs = [], raf = null, phase = "idle";

function show(id){
  document.querySelectorAll(".scene").forEach(s => s.classList.remove("on"));
  $(id).classList.add("on");
}
document.querySelectorAll("#deckpick button").forEach(b=>{
  b.onclick = ()=>{ document.querySelectorAll("#deckpick button").forEach(x=>x.classList.remove("sel"));
    b.classList.add("sel"); deck = b.dataset.deck; };
});
function secureIndex(n){
  const a = new Uint32Array(1); crypto.getRandomValues(a); return a[0] % n;
}
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

$("#start").onclick = ()=>{
  pool = CARDS.filter(c => deck === "mix" || c.deck === deck);
  show("#table-scene");
  buildTable();
};

function buildTable(){
  const T = $("#table"); T.innerHTML = ""; backs = [];
  const W = T.clientWidth, H = Math.max(T.clientHeight, 430);
  const n = pool.length;
  const cw = W < 520 ? 58 : 76, ch = cw * 1.45;
  // まず整然と並べる(テーブルに裏向き)
  const cols = Math.ceil(Math.sqrt(n * (W / H)));
  const rows = Math.ceil(n / cols);
  const gx = W / (cols + 1), gy = (H - 40) / (rows + 1);
  for(let i = 0; i < n; i++){
    const d = document.createElement("div");
    d.className = "cardback"; d.style.width = cw + "px"; d.style.height = ch + "px";
    d.innerHTML = BACK_SVG;
    const c = i % cols, r = (i / cols) | 0;
    const x0 = gx * (c + 1) - cw / 2, y0 = gy * (r + 1) - ch / 2 + 20;
    d.style.transform = `translate(${x0}px,${y0}px) rotate(${(Math.random()*6-3).toFixed(1)}deg)`;
    T.appendChild(d);
    backs.push({el:d, x:x0, y:y0,
      ang: Math.random() * Math.PI * 2,
      spd: (0.2 + Math.random() * 0.32) * (Math.random() < .5 ? 1 : -1),
      rad: 0, radT: 46 + Math.random() * Math.min(W, H) * 0.34,
      rot: Math.random() * 360, rotSpd: (Math.random() * 14 - 7)});
  }
  phase = "dealt";
  setTimeout(()=>{ if(phase === "dealt") startShuffle(W, H); }, reduced ? 100 : 900);
}

function startShuffle(W, H){
  phase = "shuffling";
  if(reduced){ return; } // 動きを控える設定では静止のまま待つ
  const cx = W / 2 - 26, cy = Math.max($("#table").clientHeight, 430) / 2 - 40;
  let last = performance.now();
  const step = (t)=>{
    const dt = Math.min((t - last) / 1000, .05); last = t;
    for(const b of backs){
      b.ang += b.spd * dt;
      b.rad += (b.radT - b.rad) * Math.min(dt * 0.9, 1);
      b.rot += b.rotSpd * dt;
      const x = cx + Math.cos(b.ang) * b.rad, y = cy + Math.sin(b.ang) * b.rad * 0.62;
      b.el.style.transform = `translate(${x}px,${y}px) rotate(${b.rot}deg)`;
    }
    raf = requestAnimationFrame(step);
  };
  raf = requestAnimationFrame(step);
}

$("#table").onclick = ()=> stopAndDraw();
$("#hint").onclick = ()=> stopAndDraw();
function stopAndDraw(){
  if(phase !== "shuffling" && phase !== "dealt") return;
  phase = "drawing";
  if(raf) cancelAnimationFrame(raf);
  const idx = secureIndex(pool.length);
  const chosen = pool[idx];
  const T = $("#table");
  const W = T.clientWidth, H = Math.max(T.clientHeight, 430);
  $("#hint").style.opacity = 0;
  backs.forEach((b, i)=>{
    if(i === idx){
      b.el.style.transition = "transform 2.1s cubic-bezier(.3,.05,.22,1)";
      b.el.style.transform = `translate(${W/2-38}px,${H/2-80}px) rotate(0deg) scale(1.3)`;
      b.el.style.zIndex = 10;
    }else{
      b.el.style.transition = "transform .9s cubic-bezier(.5,.05,.3,1), opacity .8s";
      b.el.style.transform += " scale(.6)";
      b.el.style.opacity = 0;
    }
  });
  setTimeout(()=> reveal(chosen), reduced ? 150 : 2150);
}

function reveal(c){
  show("#result");
  const img = $("#cardimg"); img.src = c.img; img.alt = c.jp;
  // カードサイズ(縦横比は画像に合わせる)
  const maxW = Math.min(390, innerWidth - 64);
  const fw = maxW, fh = maxW * 1.5;
  const wrap = $("#flipwrap"), card = $("#flipcard");
  wrap.style.width = fw + "px"; wrap.style.height = fh + "px";
  card.style.width = fw + "px"; card.style.height = fh + "px";
  card.classList.remove("flipped");
  $("#info").classList.remove("show");
  $("#info .deckline").textContent = c.deckLabel + "  ·  No." + c.no;
  $("#info h2").textContent = c.jp;
  $("#info .en").textContent = c.en;
  $("#info .mt").textContent = c.mt ? "―  " + c.mt + "  ―" : "";
  $("#info .chips.kws").innerHTML = c.kw.map(k=>`<span>${k}</span>`).join("");
  $("#info .msg").textContent = c.msg;
  $("#info .chips.subs").innerHTML = c.sub.map(k=>`<span>${k}</span>`).join("");
  $("#hintbox").style.display = c.sub.length ? "" : "none";
  if(!reduced){
    wrap.style.animation = "none"; void wrap.offsetWidth;
    wrap.style.animation = "growin 1.6s cubic-bezier(.25,.1,.25,1)";
  }
  img.decode ? img.decode().catch(()=>{}).then(fire) : fire();
  function fire(){
    setTimeout(()=> card.classList.add("flipped"), reduced ? 60 : 1000);
    setTimeout(()=> $("#info").classList.add("show"), reduced ? 200 : 2100);
  }
}
$("#again").onclick = ()=>{  // 同じデッキでそのままもう一度混ぜる
  phase = "idle"; $("#hint").style.opacity = 1;
  show("#table-scene"); buildTable();
};
$("#home").onclick = ()=>{ show("#intro"); phase = "idle"; $("#hint").style.opacity = 1; };
window.addEventListener("resize", ()=>{ if(phase === "shuffling"){ /* サイズ変更時はそのまま */ } });
</script>
